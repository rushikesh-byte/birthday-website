<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blow the Candles</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="candles.css">
</head>

<body>

<div class="card">

    <div class="top">

        <div class="dots">
            <span class="red"></span>
            <span class="yellow"></span>
            <span class="green"></span>
        </div>

        <div class="title">
            diksha's bday.candles
        </div>

        <div class="menu">
            <span></span>
            <span></span>
            <span></span>
        </div>

    </div>

    <div class="content">

        <h1>🕯️ Make a Wish</h1>

        <p>
            Close your eyes, make a wish,<br>
            then blow out the candles!
        </p>

        <div class="cake">

            <div class="candle">
                <div class="flame"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
            </div>

            <div class="candle">
                <div class="flame"></div>
            </div>

            <div class="cake-body"></div>

        </div>

        <button onclick="blowCandles()">
            🌬 Blow the Candles
        </button>

    </div>

</div>

<script>

function blowCandles(){

    const flames = document.querySelectorAll(".flame");

    flames.forEach((flame, index) => {

        setTimeout(() => {

            flame.style.opacity = "0";
            flame.style.transform = "translateY(-20px) scale(.2)";

        }, index * 200);

    });

    // Wait until the animation finishes
    setTimeout(() => {

        document.body.style.opacity = "0";

        setTimeout(() => {

            window.location.href = "gallery.html";

        }, 500);

    }, 1500);

}

</script>
<audio id="bgMusic" autoplay loop>
    <source src="music/bmb.mp3" type="audio/mpeg">
</audio>

<script src="music.js"></script>
</body>
</html>
