<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery</title>

    <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@700&family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="gallery.css">
</head>
<body>

<div class="gallery">

    <div class="polaroid rotate-left">
        <img src="images/photo1.jpg">
        <p>❤️</p>
    </div>

    <div class="polaroid rotate-right">
        <img src="images/photo2.jpg">
        <p>💕</p>
    </div>

    <div class="polaroid">
        <img src="images/photo3.jpg">
        <p>✨</p>
    </div>

    <div class="polaroid rotate-left">
        <img src="images/photo4.jpg">
        <p>🌸</p>
    </div>

    <div class="polaroid rotate-right">
        <img src="images/photo5.jpg">
        <p>🥰</p>
    </div>

    <div class="polaroid">
        <img src="images/photo6.jpg">
        <p>💖</p>
    </div>

</div>
<button class="next-btn" onclick="window.location.href='message.html'">
    Continue ❤️
</button>
<audio id="bgMusic" autoplay loop>
    <source src="music/bmb.mp3" type="audio/mpeg">
</audio>

<script src="music.js"></script>
</body>
</html>
